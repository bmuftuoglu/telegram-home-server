services:
  metu-sports-watcher:
    build: .
    container_name: metu-sports-watcher
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - metu-sports-data:/data
    networks:
      - homebot

networks:
  homebot:
    external: true

volumes:
  metu-sports-data:
